name: CI

# Safety net: run the focused test suite on every push and PR so regressions
# in the highest-risk paths (auth/JWT, request validation, widget origin,
# knowledge chunking, widget/leads contracts) are caught before merge.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # LTS versions >= the engines floor in package.json (node >=18.17).
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
