name: CI

# Safety net: run the focused test suite on every push and PR so regressions
# in the highest-risk paths (auth/JWT, request validation, widget origin,
# knowledge chunking, widget/leads contracts) are caught before merge.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # LTS versions >= the engines floor in package.json (node >=18.17).
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # DB-backed integration tests (ACM-15): auth (register/login/refresh/me/logout),
  # widget leads capture + analytics event ingest against real Express + Postgres(+pgvector) + Redis.
  integration:
    name: integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: ankane/pgvector:latest
        env:
          POSTGRES_USER: emble
          POSTGRES_PASSWORD: emble
          POSTGRES_DB: emble_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U emble"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # test:integration пересоздаёт эту БД (DROP/CREATE) и прогоняет миграции перед тестами.
      TEST_DATABASE_URL: postgres://emble:emble@localhost:5432/emble_test
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare test DB + run integration tests
        run: npm run test:integration
