<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Emble — Дашборд</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/base.css">
<link rel="stylesheet" href="/css/dashboard.css">
</head>
<body class="dash">

<!-- ===================== AUTH VIEW ===================== -->
<div id="authView" class="auth-wrap">
  <div class="glow" style="top:-160px; left:50%; transform:translateX(-50%); width:700px; height:500px; background:radial-gradient(closest-side, rgba(99,102,241,0.18), transparent 70%); position:fixed;"></div>
  <div class="card auth-card" style="position:relative;">
    <div class="lang-switcher" style="position:absolute; top:20px; right:20px; display:flex; gap:8px; font-size:13px; font-weight:600; z-index: 10;">
      <button class="lang-btn lang-btn-ua" style="background:none; border:none; color:#818CF8; cursor:pointer; padding:2px; font-family:inherit;">UA</button>
      <span style="color:rgba(255,255,255,0.15)">|</span>
      <button class="lang-btn lang-btn-ru" style="background:none; border:none; color:#6B7280; cursor:pointer; padding:2px; font-family:inherit;">RU</button>
      <span style="color:rgba(255,255,255,0.15)">|</span>
      <button class="lang-btn lang-btn-en" style="background:none; border:none; color:#6B7280; cursor:pointer; padding:2px; font-family:inherit;">EN</button>
    </div>
    <a href="/" class="auth-logo" style="text-decoration:none;">
      <div class="brand-logo"><span></span></div>
      <span class="brand-name">Emble</span>
    </a>

    <!-- Регистрация отключена: доступ выдаётся вручную (логин + пароль). Оставляем только вход. -->
    <div class="auth-tabs" style="display:none;">
      <button class="auth-tab" id="tabLogin" type="button" data-i18n="auth_login_tab">Вход</button>
      <button class="auth-tab" id="tabRegister" type="button" data-i18n="auth_register_tab">Регистрация</button>
    </div>

    <div id="loginPane">
      <h1 data-i18n="auth_login_title">С возвращением</h1>
      <p class="sub" data-i18n="auth_login_sub">Войдите, чтобы управлять агентами.</p>
      <div id="loginError"></div>
      <form id="loginForm">
        <div class="field">
          <label for="loginEmail" data-i18n="auth_email">Email</label>
          <input type="email" id="loginEmail" required autocomplete="email">
        </div>
        <div class="field">
          <label for="loginPassword" data-i18n="auth_password">Пароль</label>
          <input type="password" id="loginPassword" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;" id="loginSubmit" data-i18n="auth_login_btn">Войти</button>
      </form>
      <div class="auth-foot"><span data-i18n="auth_demo">Демо-доступ:</span> <b>demo@emble.ai</b> / <b>password123</b> <span data-i18n="auth_seed">(после npm run seed)</span></div>
    </div>

    <div id="registerPane" style="display:none;">
      <h1 data-i18n="auth_reg_title">Создать аккаунт</h1>
      <p class="sub" data-i18n="auth_reg_sub">Бесплатный тариф навсегда, без карты.</p>
      <div id="registerError"></div>
      <form id="registerForm">
        <div class="field">
          <label for="regOrg" data-i18n="auth_reg_org">Название организации</label>
          <input type="text" id="regOrg" required minlength="2" maxlength="120">
        </div>
        <div class="field">
          <label for="regEmail" data-i18n="auth_email">Email</label>
          <input type="email" id="regEmail" required autocomplete="email">
        </div>
        <div class="field">
          <label for="regPassword" data-i18n="auth_password">Пароль</label>
          <input type="password" id="regPassword" required minlength="8" maxlength="72" autocomplete="new-password">
          <div class="hint" data-i18n="auth_reg_pass_hint">Минимум 8 символов</div>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;" id="registerSubmit" data-i18n="auth_reg_btn">Создать агента бесплатно</button>
      </form>
    </div>
  </div>
</div>

<!-- ===================== APP VIEW ===================== -->
<div id="appView" style="display:none;">
  <nav class="dash-nav">
    <div class="dash-nav-inner">
      <a href="#" class="brand-mark" id="homeLink">
        <div class="brand-logo"><span></span></div>
        <span class="brand-name">Emble</span>
      </a>
      <div class="user-box" style="display:flex; align-items:center; gap:16px;">
        <div class="lang-switcher" style="display:flex; gap:8px; font-size:13px; font-weight:600; margin-right:8px;">
          <button class="lang-btn lang-btn-ua" style="background:none; border:none; color:#818CF8; cursor:pointer; padding:2px; font-family:inherit;">UA</button>
          <span style="color:rgba(255,255,255,0.15)">|</span>
          <button class="lang-btn lang-btn-ru" style="background:none; border:none; color:#6B7280; cursor:pointer; padding:2px; font-family:inherit;">RU</button>
          <span style="color:rgba(255,255,255,0.15)">|</span>
          <button class="lang-btn lang-btn-en" style="background:none; border:none; color:#6B7280; cursor:pointer; padding:2px; font-family:inherit;">EN</button>
        </div>
        <span class="org-name" id="userEmailLabel"></span>
        <button class="btn btn-outline btn-sm" id="logoutBtn" data-i18n="auth_logout">Вийти</button>
      </div>
    </div>
  </nav>

  <main class="dash-main">
    <!-- Agents list -->
    <div id="agentsListView">
      <div class="dash-head">
        <div>
          <h1 data-i18n="dash_my_agents">Мої агенти</h1>
          <p data-i18n="dash_agents_desc">Створіть ШІ-агента та отримайте код для вставки на сайт.</p>
        </div>
        <button class="btn btn-primary" id="createAgentBtn" data-i18n="dash_create_agent">+ Створити агента</button>
      </div>
      <div id="agentsError"></div>
      <div id="agentsGrid" class="agents-grid"></div>
    </div>

    <!-- Agent detail -->
    <div id="agentDetailView" style="display:none;"></div>
  </main>
</div>

<!-- ===================== CREATE AGENT MODAL ===================== -->
<div id="createModal" class="modal-backdrop" style="display:none;">
  <div class="modal">
    <h2 data-i18n="modal_new_agent">Новий агент</h2>
    <div id="createError"></div>
    <form id="createForm">
      <div class="field">
        <label for="agentName" data-i18n="modal_name">Назва</label>
        <input type="text" id="agentName" required minlength="2" maxlength="120" placeholder="Наприклад, Підтримка сайту" data-i18n-placeholder="modal_name_placeholder">
      </div>
      <div class="field">
        <label data-i18n="modal_template">Шаблон поведінки</label>
        <div class="template-pick" id="templatePick"></div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" id="cancelCreateBtn" data-i18n="modal_cancel">Скасувати</button>
        <button type="submit" class="btn btn-primary" id="createSubmit" data-i18n="modal_create">Створити</button>
      </div>
    </form>
  </div>
</div>

<div id="toastRoot"></div>

<script src="/js/api.js"></script>
<script src="/js/dashboard.js"></script>
</body>
</html>
