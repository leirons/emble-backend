version: "3.8"

services:
  postgres:
    image: ankane/pgvector:latest
    restart: unless-stopped
    environment:
      POSTGRES_USER: emble
      POSTGRES_PASSWORD: emble
      POSTGRES_DB: emble
    ports:
      - "5432:5432"
    volumes:
      - emble_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build: .
    command: npm start
    env_file: .env
    depends_on:
      - postgres
      - redis
    ports:
      - "4000:4000"

  worker:
    build: .
    command: npm run worker
    env_file: .env
    depends_on:
      - postgres
      - redis

volumes:
  emble_pgdata:
